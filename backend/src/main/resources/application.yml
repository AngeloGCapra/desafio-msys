spring:
  application:
    name: desafio
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/desafio_msys}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      # Schema gerenciado por schema.sql para respeitar os tipos do enunciado (INT4 etc.)
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

server:
  port: ${BACKEND_PORT:8080}
